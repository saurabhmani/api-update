# ═══════════════════════════════════════════════════════════════════
#  Quantorus365 — nginx site config (Private VPS)
#
#  Deploy:
#    1. Replace quantorus.in / www.quantorus.in below with your domain
#    2. Copy to nginx sites:
#         sudo cp nginx.conf /etc/nginx/sites-available/quantorus365
#         sudo ln -s /etc/nginx/sites-available/quantorus365 /etc/nginx/sites-enabled/
#    3. Test: sudo nginx -t
#    4. Get SSL cert: sudo certbot --nginx -d quantorus.in -d www.quantorus.in
#    5. Reload: sudo systemctl reload nginx
#
#  Ports (never expose — nginx proxies internally):
#    5000 → Next.js app (served by server.js)
#    5001 → WebSocket stream server (bound inside same Node process)
# ═══════════════════════════════════════════════════════════════════

# ── Redirect all HTTP to HTTPS ───────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name quantorus.in www.quantorus.in;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name quantorus.in www.quantorus.in;

    # ── SSL — filled in automatically by Certbot ─────────────────
    ssl_certificate     /etc/letsencrypt/live/quantorus.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quantorus.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options "nosniff"                           always;
    add_header X-XSS-Protection       "1; mode=block"                     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;

    # ── Compression ──────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript;

    # ── WebSocket proxy (/ws → port 5001) ────────────────────────
    #
    # CRITICAL: Without this block, all pages show "WS: DISCONNECTED"
    # and live Kite prices never reach the browser. Browsers on HTTPS
    # cannot connect to ws://host:5001 directly (mixed-content block).
    # nginx upgrades the connection here and proxies it internally.
    #
    # This handles:  wss://quantorus.in/ws  →  ws://127.0.0.1:5001
    #
    location /ws {
        proxy_pass          http://127.0.0.1:5001;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade     $http_upgrade;
        proxy_set_header    Connection  "upgrade";
        proxy_set_header    Host        $host;
        proxy_set_header    X-Real-IP   $remote_addr;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
        proxy_cache         off;
    }

    # ── Next.js static assets (long cache) ───────────────────────
    location /_next/static {
        proxy_pass  http://127.0.0.1:5000;
        add_header  Cache-Control "public, max-age=31536000, immutable";
        access_log  off;
    }

    # ── Next.js app (all other requests → port 5000) ─────────────
    location / {
        proxy_pass          http://127.0.0.1:5000;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_read_timeout  60s;
        proxy_buffering     off;
        # Required for Next.js SSE (/api/events) to stream events
        # without nginx buffering them into one delayed flush.
        proxy_cache_bypass  $http_upgrade;
    }
}
